<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0d1117"/>

  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#1a2233" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="640" stroke="#1a2233" stroke-width="1"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="#238636"/>

  <!-- Main title -->
  <text
    x="640"
    y="220"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="86"
    font-weight="700"
    fill="#f0f6fc"
    text-anchor="middle"
    letter-spacing="-2">Personal OS Skeleton</text>

  <!-- Subtitle -->
  <text
    x="640"
    y="310"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="34"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    letter-spacing="0.3">Your life as a privacy-safe multi-agent system</text>

  <!-- Second subtitle line -->
  <text
    x="640"
    y="358"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="34"
    font-weight="400"
    fill="#8b949e"
    text-anchor="middle"
    letter-spacing="0.3">Built for Claude Code</text>

  <!-- Feature pills row -->
  <!-- Pill 1: Multi-agent -->
  <rect x="180" y="420" width="220" height="44" rx="22" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="290" y="447" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#58a6ff" text-anchor="middle">Multi-agent</text>

  <!-- Pill 2: Semantic Memory -->
  <rect x="420" y="420" width="240" height="44" rx="22" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="540" y="447" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#58a6ff" text-anchor="middle">Semantic Memory</text>

  <!-- Pill 3: Privacy-first -->
  <rect x="680" y="420" width="210" height="44" rx="22" fill="#161b22" stroke="#238636" stroke-width="1"/>
  <text x="785" y="447" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#3fb950" text-anchor="middle">Privacy-first</text>

  <!-- Pill 4: MIT -->
  <rect x="910" y="420" width="130" height="44" rx="22" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="975" y="447" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">MIT</text>

  <!-- Footer line -->
  <text
    x="640"
    y="590"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="400"
    fill="#484f58"
    text-anchor="middle">github.com/thakkarsagar12/personal-os-skeleton · MIT</text>

  <!-- Accent bar bottom -->
  <rect x="0" y="636" width="1280" height="4" fill="#238636"/>
</svg>
